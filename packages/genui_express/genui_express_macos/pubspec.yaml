name: genui_express_macos
description: macOS-specific implementation of the genui_express plugin utilizing Apple Intelligence Foundation Models.
version: 0.1.0
publish_to: none

resolution: workspace

environment:
  sdk: ^3.12.0
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  genui_express_platform_interface:
    path: ../genui_express_platform_interface
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      macos:
        dartPluginClass: GenuiExpressMacos
        pluginClass: GenuiExpressPlugin
