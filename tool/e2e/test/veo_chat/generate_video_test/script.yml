story: >
   A girl is sitting on a sofa and knitting. Yarn ball is next to her on the floor in a basket.
   
   A kitten is sitting on the floor and watching her with interest.
   Kitten looks at the yarn ball with interest and decides to play with it.
   She jumps into the basket and starts playing with the yarn ball.
   The kitten chases it around the room, knocking over
      furniture and causing chaos.
   The girl is looking on it  scared and shocked.She drops her knitting and put hands on her face.
   Then she hears 'Mew!' and opens her eyes. Then her scared face turns into a big smile. She 
   finds the yarn mess on the floor shaped in a heart. She smiles and pets the kitten.


keyframe1:
   description: A kitten decides to play with a ball of yarn. 
   duration: 2s
   
keyframe2:
   description: >
      Suddenly, the yarn comes alive and starts running around
      the room.
      The kitten chases it around the room, knocking over
      furniture and causing chaos. 
   duration: 10s

keyframe3:
   description: > 
      Finally, the kitten catches the yarn and settles
      down for a nap.
   duration: 2s
